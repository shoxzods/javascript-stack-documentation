<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@for @each @while</title>
    <link rel="stylesheet" href="./for_each_white.css">
</head>
<body>
    <ul class="list">
        <li class="list__first">list 1</li>
        <li class="list__second">list 2</li>
        <li class="list__third">list 3</li>
    </ul>

    <ul class="ol">
        <li class="ol__red">list1</li>
        <li class="ol__green">list2</li>
        <li class="ol__blue">list3</li>
    </ul>

    <button class="btn-sm">sm</button>
    <button class="btn-md">md</button>
    <button class="btn-lg">lg</button>


    <div class="block">
        <div class="block__1">red</div>
        <div class="block__2">blue</div>
        <div class="block__3">green</div>
    </div>

    <div>
        <div class="i_1">1</div>
        <div class="i_2">2</div>
        <div class="i_3">3</div>
    </div>

    <button class="mall_1">1</button>
    <button class="mall_2">2</button>
    <button class="mall_3">3</button>
</body>
</html>
